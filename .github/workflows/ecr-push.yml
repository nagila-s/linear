name: Push images to ECR

on:
  push:
    tags:
      - "v*"

env:
  AWS_REGION: us-east-2

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push linear-api
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.ref_name }}
        run: |
          docker build -f Dockerfile.api -t "$REGISTRY/linear-api:$TAG" .
          docker push "$REGISTRY/linear-api:$TAG"
          docker tag "$REGISTRY/linear-api:$TAG" "$REGISTRY/linear-api:latest"
          docker push "$REGISTRY/linear-api:latest"

      - name: Build and push linear-worker
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.ref_name }}
        run: |
          docker build -f Dockerfile.worker -t "$REGISTRY/linear-worker:$TAG" .
          docker push "$REGISTRY/linear-worker:$TAG"
          docker tag "$REGISTRY/linear-worker:$TAG" "$REGISTRY/linear-worker:latest"
          docker push "$REGISTRY/linear-worker:latest"
